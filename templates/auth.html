{% extends "base.html" %}

{% block title %}Client Authentication{% endblock %}

{% block content %}
<section class="section">
  <div class="container">
    <div class="auth-wrapper">
      <div class="auth-card">
        <!-- Auth switching tabs -->
        <div class="auth-tabs">
          <div class="auth-tab active" id="tab-login" onclick="switchAuthTab('login')">Sign In</div>
          <div class="auth-tab" id="tab-signup" onclick="switchAuthTab('signup')">Create Account</div>
        </div>

        <!-- Login Form Panel -->
        <div class="auth-form-panel active" id="panel-login">
          <form action="/login" method="POST" id="loginForm">
            <!-- Hidden redirect holder -->
            <input type="hidden" name="redirect" value="{{ request.args.get('redirect', '') }}">
            
            <div class="form-group">
              <label for="loginEmail">Email Address</label>
              <input type="email" name="email" id="loginEmail" class="form-input" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
              <label for="loginPassword">Password</label>
              <div class="input-wrapper">
                <input type="password" name="password" id="loginPassword" class="form-input" placeholder="••••••••" required>
                <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                  <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                </button>
              </div>
            </div>
            
            <div class="form-row">
              <label class="checkbox-label">
                <input type="checkbox" name="remember" value="yes" checked>
                <span>Remember me</span>
              </label>
            </div>
            
            <button type="submit" class="btn btn-primary auth-submit-btn">
              Sign In <i data-lucide="log-in"></i>
            </button>
          </form>
          
          <div style="margin-top: 24px; text-align: center; font-size: 13px; color: var(--color-text-muted);">
            <p>Admin account seeded? Use the default credentials mentioned in the documentation.</p>
          </div>
        </div>

        <!-- Signup Form Panel -->
        <div class="auth-form-panel" id="panel-signup">
          <form action="/signup" method="POST" id="signupForm">
            <!-- Hidden redirect holder -->
            <input type="hidden" name="redirect" value="{{ request.args.get('redirect', '') }}">
            
            <div class="form-group">
              <label for="signupUsername">Username</label>
              <input type="text" name="username" id="signupUsername" class="form-input" placeholder="username" required pattern="[a-zA-Z0-9]+">
            </div>

            <div class="form-group">
              <label for="signupEmail">Email Address</label>
              <input type="email" name="email" id="signupEmail" class="form-input" placeholder="name@example.com" required>
            </div>
            
            <div class="form-group">
              <label for="signupPassword">Password</label>
              <div class="input-wrapper">
                <input type="password" name="password" id="signupPassword" class="form-input" placeholder="••••••••" required>
                <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                  <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                </button>
              </div>
            </div>
            
            <div class="form-group">
              <label for="signupConfirmPassword">Confirm Password</label>
              <div class="input-wrapper">
                <input type="password" name="confirm_password" id="signupConfirmPassword" class="form-input" placeholder="••••••••" required>
                <button type="button" class="password-toggle-btn" aria-label="Toggle password visibility">
                  <i data-lucide="eye" style="width: 18px; height: 18px;"></i>
                </button>
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary auth-submit-btn">
              Create Account <i data-lucide="user-plus"></i>
            </button>
          </form>
        </div>
      </div>
    </div>
  </div>
</section>
{% endblock %}

{% block extra_js %}
<script>
  function switchAuthTab(type) {
    const tabLogin = document.getElementById('tab-login');
    const tabSignup = document.getElementById('tab-signup');
    const panelLogin = document.getElementById('panel-login');
    const panelSignup = document.getElementById('panel-signup');
    
    if (type === 'login') {
      tabLogin.classList.add('active');
      tabSignup.classList.remove('active');
      panelLogin.classList.add('active');
      panelSignup.classList.remove('active');
    } else {
      tabSignup.classList.add('active');
      tabLogin.classList.remove('active');
      panelSignup.classList.add('active');
      panelLogin.classList.remove('active');
    }
  }

  // Client-side signup matching check
  document.getElementById('signupForm').addEventListener('submit', function(e) {
    const pwd = document.getElementById('signupPassword').value;
    const pwdConf = document.getElementById('signupConfirmPassword').value;
    if (pwd !== pwdConf) {
      e.preventDefault();
      window.showToast("Passwords do not match.", "error");
    }
  });
</script>
{% endblock %}
